name: Export Notebooks

on:
  # Trigger on new releases from marimo-team/marimo
  repository_dispatch:
    types: [marimo-release]

  # Trigger on push to main, but ignore if in generated files
  push:
    branches: [main]
    paths-ignore:
      - 'generated/**'
      - 'public/**'

  # Trigger nightly
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC

  # Allow manual trigger
  workflow_dispatch: {}

jobs:
  export-notebooks:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: 📄 Install system dependencies (LaTeX and Pandoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-plain-generic pandoc poppler-utils
        continue-on-error: true

      - name: 📦 Install Python dependencies
        run: |
          uv sync --extra pdf

      - name: 🎭 Install Chromium (for WebPDF)
        run: |
          uv run python -m playwright install --with-deps chromium

      - name: 🖼️ PDF visual snapshot test
        id: pdf_snapshot
        run: |
          uv run scripts/test_pdf_visual_snapshots.py

      - name: 📦 Upload PDF snapshot artifacts (on failure)
        if: failure() && steps.pdf_snapshot.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: pdf-visual-snapshot-artifacts
          path: snapshot_artifacts/
          if-no-files-found: ignore
          retention-days: 7

      - name: 📂 Setup examples
        run: |
          uv run scripts/setup_examples.py

      - name: 🛠️ Run export script
        run: |
          uv run scripts/export_notebooks.py || uv run scripts/export_notebooks.py --skip-pdf --skip-webpdf
        continue-on-error: false

      - name: 🧪 Validate exports
        run: |
          uv run scripts/test_exports.py

      - name: 📄 List changed files
        continue-on-error: true
        run: |
          echo "Changed files:"
          git diff --name-only HEAD^ HEAD

      - name: 📊 Export statistics
        run: |
          echo "=== Export Statistics ==="
          echo "Generated files:"
          find generated -type f | wc -l
          echo "Public files:"
          find public -type f | wc -l
          echo "PDF files:"
          find generated -name "*.pdf" | wc -l || echo "0"
          echo "WebPDF files:"
          find generated -name "*.webpdf.pdf" | wc -l || echo "0"

      - name: 📦 Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: public

      - name: 📦 Upload Generated Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: generated-notebooks
          path: generated/
          retention-days: 30

      - name: 🔄 Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          commit-message: 'Update exported notebooks'
          branch: update-exported-notebooks
          title: 'Update exported notebooks'
          body: 'This PR updates the exported notebooks.'
          labels: |
            automated
          assignees: |
            mscolnick
          add-paths: |
            generated/*
            public/*

  deploy:
    needs: export-notebooks
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: github-pages
